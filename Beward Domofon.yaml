              priority: INFO
        - uuid: e1c70b9855ae4e82ac99aa573362716c
          name: HostName
          type: HTTP_AGENT
          key: HostName
          delay: 8h
          history: 90d
          value_type: TEXT
          authtype: BASIC
          username: admin
          password: kJpq-93p
          inventory_link: NAME
          preprocessing:
            - type: REGEX
              parameters:
                - HostName=(\d+)
                - \1
          url: 'http://{HOST.CONN}/cgi-bin/systeminfo_cgi?'
        - uuid: 427e63c5b9d3429e91518ccd6297b1b1
          name: SystemParameters
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.2.1.25.1.4.0
          key: hrSystemInitialLoadParameters
