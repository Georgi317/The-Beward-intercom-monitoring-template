        - uuid: 18fdd1a66ba54ea785da77bd0a3b2730
          name: AdminStatus
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.2.1.2.2.1.7.1
          key: ifAdminStatus
          delay: 8h
          history: 90d
          value_type: TEXT
          preprocessing:
            - type: REGEX
              parameters:
                - '1'
