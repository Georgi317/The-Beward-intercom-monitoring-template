          triggers:
            - uuid: a9cc6d032d3f418194069e1ca4eb3f6d
              expression: 'last(/Beward Domofon/ifAdminStatus)=0'
              name: 'Unavailable by down link'
              priority: HIGH
              description: |
                Last value: {ITEM.LASTVALUE1}.
                Last three attempts returned timeout.  Please check device connectivity.
              manual_close: 'YES'
        - uuid: 6f7b5fb119af43e39992b6ece0d73170
          name: Model
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.2.1.1.5.0
          key: ifDescr
          delay: 8h
          history: 90d
          value_type: TEXT
          description: ifDescr
          inventory_link: MODEL
        - uuid: e2c248dab9844c118601acbf06f32e82
          name: 'MAC Address'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.2.1.2.2.1.6.2
          key: ifPhysAddress
          delay: 8h
          history: 90d
          value_type: TEXT
          inventory_link: MACADDRESS_A
        - uuid: 135d179eba914fca80a74f22e7579832
          name: 'Reg Status SIP1'
          type: HTTP_AGENT
          key: sipregstatussip1
          trends: '0'
          authtype: BASIC
          username: admin
          password: kJpq-93p
          preprocessing:
            - type: REGEX
              parameters:
                - AccountReg1=(\d)
                - \1
          url: 'http://{HOST.CONN}/cgi-bin/sip_cgi?action=regstatus'
          ssl_cert_file: admin
          ssl_key_file: kJpq-93p
          triggers:
            - uuid: 07e5efa5e4a44169b0b21cdf9c5a3629
              expression: 'last(/Beward Domofon/sipregstatussip1)=0'
              name: 'Account reg SIP1'
              priority: HIGH
        - uuid: 087a0ed2748a44988753742fc4ed93cf
          name: 'Reg Status SIP2'
          type: HTTP_AGENT
          key: sipregstatussip2
          trends: '0'
          status: DISABLED
          authtype: BASIC
          username: admin
          password: kJpq-93p
          preprocessing:
            - type: REGEX
              parameters:
                - AccountReg2=(\d)
                - \1
          url: 'http://{HOST.CONN}/cgi-bin/sip_cgi?action=regstatus'
          ssl_cert_file: admin
          ssl_key_file: kJpq-93p
          triggers:
            - uuid: 65ea68ca359242518c8349cdabeb6278
              expression: 'last(/Beward Domofon/sipregstatussip2)=0'
              name: 'Account reg SIP2'
              priority: HIGH
        - uuid: 4d3d5415839c487997837715336bf677
          name: SoftwareVersion
          type: HTTP_AGENT
          key: SoftwareVersion
          value_type: TEXT
          authtype: BASIC
          username: admin
          password: kJpq-93p
          inventory_link: SOFTWARE
          preprocessing:
            - type: REGEX
              parameters:
                - 'SoftwareVersion=(.*)'
                - \1
          url: 'http://{HOST.CONN}/cgi-bin/systeminfo_cgi?action=get'
        - uuid: 56ec7c5ee9624e4297090ab8f35cd5bc
          name: sysDescr
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.2.1.1.1.0
          key: 'systeme.description[sysDescr]'
          delay: 8h
          history: 90d
          value_type: TEXT
          description: |
            A textual description of the entity.  This value
            should include the full name and version
            identification of the system's hardware type,
            software operating-system, and networking
            software.  It is mandatory that this only contain
            printable ASCII characters.
          inventory_link: TYPE_FULL
        - uuid: d47dc53173e14a0bb064b0c4afe988f4
          name: 'Device UpTime'
          type: HTTP_AGENT
          key: UpTime
          value_type: FLOAT
          trends: 30d
          units: uptime
          authtype: BASIC
          username: admin
          password: kJpq-93p
          preprocessing:
            - type: REGEX
              parameters:
                - UpTime=(.+)
                - \1
            - type: JAVASCRIPT
              parameters:
                - |
                  var value = value.trim();
                  var days = 0;
                  var timePart = value;
                  
                  // Разделяем дни и время (формат: дни.ЧЧ:ММ:СС)
                  if (value.indexOf('.') !== -1) {
                      var parts = value.split('.');
                      days = parseInt(parts[0]);
                      timePart = parts[1];
                  }
                  
                  var timeParts = timePart.split(':');
                  var hours   = parseInt(timeParts[0]);
                  var minutes = parseInt(timeParts[1]);
                  var seconds = parseInt(timeParts[2]);
                  
                  return days * 86400 + hours * 3600 + minutes * 60 + seconds;
          url: 'http://{HOST.CONN}/cgi-bin/systeminfo_cgi?action=get'
